<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>TimeTrack Export</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3e; --accent:#5b8dee; --accent2:#38d9a9; --text:#e8eaf0; --muted:#6b7280; --radius:10px; }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); padding:20px; display:flex; flex-direction:column; gap:12px; }
    h2 { font-size:13px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
    .status { font-size:13px; color:var(--muted); }
    .status.ok  { color:var(--accent2); }
    .status.err { color:#ff6b6b; }
    .count { font-family:'DM Mono',monospace; font-size:22px; font-weight:700; color:var(--accent2); }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:11px 18px; background:var(--accent); border:none; border-radius:var(--radius); color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; transition:background .2s; }
    .btn:hover { background:#4a7de0; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <h2><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export to Excel</h2>
  <p class="status" id="status">Loading…</p>
  <div id="ready" style="display:none">
    <p style="margin-bottom:10px"><span class="count" id="row-count">0</span> <span style="font-size:12px;color:var(--muted)">cards ready</span></p>
    <button class="btn" id="dl-btn">Download Excel (.xlsx)</button>
    <p style="font-size:11px;color:var(--muted);margin-top:8px">Includes totals row and formatting.</p>
  </div>

<script>
  var t = TrelloPowerUp.iframe({ appKey: 'ed700e2887fc04558ed3a0efa61f25b6', appName: 'TimeTrack' });

  var HEADERS = ['Type','Item','Item Count','Phase','Est Hour','Worked Hours','Status','Resource','Notes'];
  var COL_ITEM_COUNT = 2, COL_EST = 4, COL_WORKED = 5;

  function setStatus(msg, cls) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (cls ? ' ' + cls : '');
    t.sizeTo(document.body);
  }

  var currentRows = null;

  function showReady(rows) {
    currentRows = rows;
    document.getElementById('row-count').textContent = rows.length;
    document.getElementById('ready').style.display = 'block';
    setStatus('Ready — ' + rows.length + ' cards.', 'ok');
  }

  function buildAndDownload(rows) {
    var wb = new ExcelJS.Workbook();
    var ws = wb.addWorksheet('TimeTrack Export');

    var headerRow = ws.addRow(HEADERS);
    headerRow.font = { bold: true };
    headerRow.alignment = { vertical: 'middle' };

    var sumItemCount = 0, sumEst = 0, sumWorked = 0;
    rows.forEach(function(r) {
      ws.addRow(r);
      sumItemCount += parseFloat(r[COL_ITEM_COUNT]) || 0;
      sumEst       += parseFloat(r[COL_EST])        || 0;
      sumWorked    += parseFloat(r[COL_WORKED])     || 0;
    });

    var totalRowValues = new Array(HEADERS.length).fill('');
    totalRowValues[0] = 'TOTAL';
    totalRowValues[COL_ITEM_COUNT] = sumItemCount;
    totalRowValues[COL_EST]        = sumEst;
    totalRowValues[COL_WORKED]     = sumWorked;
    var totalRow = ws.addRow(totalRowValues);
    totalRow.font = { bold: true };
    totalRow.eachCell(function(cell) {
      cell.border = { top: { style: 'thin' } };
    });

    var itemCountCol = ws.getColumn(COL_ITEM_COUNT + 1);
    itemCountCol.alignment = { horizontal: 'center', vertical: 'middle' };

    ws.columns.forEach(function(col, i) {
      var header = HEADERS[i] || '';
      col.width = header === 'Notes' ? 40 : header === 'Item' ? 30 : header === 'Resource' ? 22 : 14;
    });

    wb.xlsx.writeBuffer().then(function(buffer) {
      var blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'timetrack-export.xlsx';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }).catch(function(err) {
      setStatus('Error building file: ' + (err.message || 'unknown'), 'err');
    });
  }

  document.getElementById('dl-btn').addEventListener('click', function() {
    if (currentRows) buildAndDownload(currentRows);
  });

  t.board('id').then(function(board) {
    var key = 'timetrack-export-' + board.id;
    var raw = null;
    try {
      raw = localStorage.getItem(key);
    } catch (e) {
      setStatus('Could not access local storage: ' + e.message, 'err');
      return;
    }

    if (!raw) {
      setStatus('No export data found. Click "Export CSV" in the board toolbar first, then reopen this popup.', 'err');
      return;
    }

    try {
      var parsed = JSON.parse(raw);
      var rows = parsed.rows || [];
      if (rows.length === 0) {
        setStatus('No cards with estimated hours were found.', 'err');
        return;
      }
      var ageMin = Math.round((Date.now() - (parsed.builtAt || 0)) / 60000);
      showReady(rows);
      if (ageMin > 0) {
        setStatus('Ready — ' + rows.length + ' cards (built ' + ageMin + ' min ago).', 'ok');
      }
    } catch (e) {
      setStatus('Error reading export data: ' + e.message, 'err');
    }
  }).catch(function(err) {
    setStatus('Error: ' + (err.message || 'unknown'), 'err');
  });
</script>
</body>
</html>
