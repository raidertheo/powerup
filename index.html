<!DOCTYPE html>
<!-- v20260703-0417 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TimeTrack Power-Up</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
// ─── Helpers ────────────────────────────────────────────────────────────────
function getData(t) {
  return t.get('card', 'shared', 'timetrack').then(d => d || { estimated: 0, spent: 0, progress: 0 });
}
function getMemberLog(t) {
  return t.get('card', 'shared', 'timetrack-members').then(d => d || []);
}
function formatHrs(n) {
  const v = parseFloat(n) || 0;
  return v === 1 ? '1 hr' : `${v} hrs`;
}
function badgeColor(progress) {
  if (progress >= 100) return 'green';
  if (progress >= 60)  return 'yellow';
  if (progress > 0)    return 'blue';
  return 'light-gray';
}

// ─── Card Badges (front of card) ─────────────────────────────────────────────
function cardBadges(t) {
  return getData(t).then(d => {
    const badges = [];
    if (d.estimated > 0 || d.spent > 0) {
      badges.push({
        text: `⏱ ${formatHrs(d.spent)} / ${formatHrs(d.estimated)}`,
        color: parseFloat(d.spent) > parseFloat(d.estimated) && d.estimated > 0 ? 'red' : 'blue'
      });
    }
    if (d.progress > 0 || d.estimated > 0 || d.spent > 0) {
      badges.push({
        text: `${d.progress || 0}%`,
        color: badgeColor(d.progress || 0)
      });
    }
    return badges;
  });
}

// ─── Card Detail Badges (inside card) ────────────────────────────────────────
function cardDetailBadges(t) {
  return Promise.all([getData(t), getMemberLog(t)]).then(([d, log]) => {
    const badges = [{
      title: 'Time Tracking',
      text: `Est: ${formatHrs(d.estimated)} | Spent: ${formatHrs(d.spent)} | ${d.progress || 0}% complete`,
      color: badgeColor(d.progress || 0),
      callback: openCardPopup
    }];
    if (log.length > 0) {
      const memberTotals = {};
      log.forEach(entry => {
        memberTotals[entry.name] = (memberTotals[entry.name] || 0) + (parseFloat(entry.hours) || 0);
      });
      const summary = Object.entries(memberTotals)
        .map(([name, hrs]) => `${name.split(' ')[0]}: ${hrs}h`)
        .join(' · ');
      badges.push({
        title: 'Team Log',
        text: `⏱ ${summary}`,
        color: 'purple',
        callback: openTeamLogPopup
      });
    }
    return badges;
  });
}

// ─── Card Buttons ─────────────────────────────────────────────────────────────
// Trello only supports ONE card button per Power-Up — combined popup with tabs
function cardButtons(t) {
  return [{
    icon: 'https://cdn-icons-png.flaticon.com/512/2088/2088617.png',
    text: 'TimeTrack',
    callback: openCardPopup
  }];
}

function openCardPopup(t) {
  return t.popup({ title: 'TimeTrack', url: './card-popup.html', height: 600 });
}
function openTeamLogPopup(t) {
  return t.popup({ title: 'TimeTrack', url: './card-popup.html?tab=team', height: 480 });
}

// ─── Board Summary ────────────────────────────────────────────────────────────
function openBoardSummary(t) {
  return t.board('id', 'name').then(board => {
    return Promise.all([t.lists('id', 'name'), t.cards('all')]).then(([lists, cards]) => {
      const promises = cards.map(card =>
        Promise.all([
          t.get(card.id, 'shared', 'timetrack').catch(() => null),
          t.get(card.id, 'shared', 'timetrack-members').catch(() => null),
          t.get(card.id, 'shared', 'timetrack-assigned').catch(() => null)
        ]).then(([d, log, assigned]) => ({
          id: card.id, listId: card.idList, name: card.name,
          assignedIds: assigned || [],
          data: d || {}, log: log || []
        }))
      );

      // Build lookup maps from card data
      const cardLabelMap    = {};
      const trelloMemberMap = {}; // cardId -> [{id, name, avatar}] from Trello native card.members
      const listNameMapEarly = {};
      lists.forEach(l => { listNameMapEarly[l.id] = l.name; });
      cards.forEach(card => {
        cardLabelMap[card.id]    = card.labels  || [];
        trelloMemberMap[card.id] = (card.members || []).map(m => ({
          id:     m.id,
          name:   m.fullName || m.username || '',
          avatar: m.avatarUrl ? m.avatarUrl + '/30.png' : null
        })).filter(m => m.name);
      });

      return Promise.all(promises).then(cardData => {
        // Pass 1 — build full member info from ALL log entries across all cards
        const memberInfoFromLog = {};
        cardData.forEach(({ log }) => {
          (log || []).forEach(entry => {
            const key = entry.memberId || entry.name;
            if (key && entry.name) {
              // Always update so we get the most complete info
              memberInfoFromLog[key] = {
                name:   entry.name,
                avatar: entry.avatar || (memberInfoFromLog[key] && memberInfoFromLog[key].avatar) || null
              };
            }
          });
        });

        const listMap  = {};
        lists.forEach(l => {
          listMap[l.id] = { id: l.id, name: l.name, estimated: 0, spent: 0, pctSum: 0, count: 0 };
        });
        const memberMap = {};
        const labelMap  = {};
        let boardEst = 0, boardSpent = 0, boardPctSum = 0, boardCount = 0;

        // Pass 2 — accumulate all data
        cardData.forEach(({ id, listId, data, log, assignedIds }) => {
          const est   = parseFloat(data.estimated) || 0;
          const spent = parseFloat(data.spent)     || 0;
          const pct   = parseInt(data.progress, 10) || 0;
          if (est > 0 || spent > 0 || pct > 0) {
            boardEst += est; boardSpent += spent; boardPctSum += pct; boardCount++;
            if (listMap[listId]) {
              listMap[listId].estimated += est;
              listMap[listId].spent     += spent;
              listMap[listId].pctSum    += pct;
              listMap[listId].count++;
            }
            // Per label — only count cards that have estimated hours AND are
            // not in the Resources list, so this matches Export's card set exactly
            if (est > 0 && listNameMapEarly[listId] !== 'Resources') {
              const labels = cardLabelMap[id] || [];
              labels.forEach(lbl => {
                if (!labelMap[lbl.id]) {
                  labelMap[lbl.id] = { name: lbl.name || lbl.color, color: lbl.color, pctSum: 0, count: 0 };
                }
                labelMap[lbl.id].pctSum += pct;
                labelMap[lbl.id].count++;
              });
            }
            // Per member — merge Trello's native card.members with Power-Up
            // Assign-tab assignments, deduplicated by member ID
            const nativeMembers = trelloMemberMap[id] || [];
            const assignedMembers = (assignedIds || []).map(mid => ({
              id: mid,
              name: (memberInfoFromLog[mid] && memberInfoFromLog[mid].name) || null,
              avatar: (memberInfoFromLog[mid] && memberInfoFromLog[mid].avatar) || null
            }));
            const seenIds = new Set();
            const combinedMembers = [];
            nativeMembers.concat(assignedMembers).forEach(m => {
              if (m.id && !seenIds.has(m.id)) {
                seenIds.add(m.id);
                combinedMembers.push(m);
              }
            });

            combinedMembers.forEach(m => {
              if (!memberMap[m.id]) {
                memberMap[m.id] = { name: m.name, avatar: m.avatar, estimated: 0, hoursLogged: 0, entries: 0, cardCount: 0 };
              }
              memberMap[m.id].estimated += est;
              memberMap[m.id].cardCount += 1;
              if (!memberMap[m.id].name && m.name) memberMap[m.id].name = m.name;
              if (!memberMap[m.id].avatar && m.avatar) memberMap[m.id].avatar = m.avatar;
            });
          }
          // Per log entry — accumulate hours and ensure member exists in map
          (log || []).forEach(entry => {
            const key = entry.memberId || entry.name;
            if (!key) return;
            if (!memberMap[key]) {
              memberMap[key] = { name: entry.name, avatar: entry.avatar || null, estimated: 0, hoursLogged: 0, entries: 0, cardCount: 0 };
            }
            memberMap[key].hoursLogged += parseFloat(entry.hours) || 0;
            memberMap[key].entries     += 1;
            if (!memberMap[key].name && entry.name)   memberMap[key].name   = entry.name;
            if (!memberMap[key].avatar && entry.avatar) memberMap[key].avatar = entry.avatar;
          });
        });

        // Finalise — only show members who have logged time
        const members = Object.values(memberMap)
          .filter(m => m.entries > 0)
          .map(m => ({
            name:        m.name || 'Unknown',
            avatar:      m.avatar,
            estimated:   m.estimated,
            hoursLogged: m.hoursLogged,
            entries:     m.entries,
            cardCount:   m.cardCount
          })).sort((a, b) => b.estimated - a.estimated);

        // Build list name lookup for card-level data
        const listNameMap = {};
        lists.forEach(l => { listNameMap[l.id] = l.name; });

        // Build member name lookup for export
        const memberNameMap = {};
        Object.entries(memberMap).forEach(([key, m]) => { memberNameMap[key] = m.name || 'Unknown'; });

        // Build a lookup from cardData by card id for quick access
        const cardDataById = {};
        cardData.forEach(item => { cardDataById[item.id] = item; });

        // Card-level data for export — include ALL cards with est > 0, excluding Resources
        const cardRows = cards
          .filter(card => listNameMap[card.idList] !== 'Resources')
          .map(card => {
            const item      = cardDataById[card.id] || {};
            const data      = item.data      || {};
            const log       = item.log       || [];
            const assignedIds = item.assignedIds || [];
            const listName  = listNameMap[card.idList] || '';
            const labels    = cardLabelMap[card.id] || [];
            const phase     = labels.find(l => l.name === 'Phase 1') ? 'Phase 1'
                            : labels.find(l => l.name === 'Phase 2') ? 'Phase 2' : '';
            const est       = parseFloat(data.estimated) || 0;
            const spent     = parseFloat(data.spent)     || 0;
            const progress  = parseInt(data.progress, 10) || 0;
            const nativeNames   = (trelloMemberMap[card.id] || []).map(m => m.name);
            const assignedNames = assignedIds.map(mid => memberNameMap[mid]).filter(Boolean);
            const allNames      = nativeNames.concat(assignedNames).filter((n, i, arr) => arr.indexOf(n) === i);
            const assigned      = allNames.length > 0;
            const notes         = log.map(e => e.note).filter(Boolean).join('; ');
            return { listName, cardName: card.name, phase, est, spent, progress, assigned, memberNames: allNames, notes };
          })
          .filter(r => r.est > 0 || r.spent > 0 || r.progress > 0 || r.notes); // Include all tracked cards

        const summary = {
          boardEst, boardSpent,
          boardAvgPct: boardCount > 0 ? Math.round(boardPctSum / boardCount) : 0,
          lists: lists.map(l => listMap[l.id]).filter(l => l.count > 0).map(l => ({
            name: l.name, estimated: l.estimated, spent: l.spent,
            avgPct: Math.round(l.pctSum / l.count), count: l.count
          })),
          allLists: lists
            .filter(l => l.name !== 'Resources')
            .sort((a, b) => a.name.localeCompare(b.name))
            .map(l => ({ id: l.id, name: l.name })),
          members,
          memberCards: (() => {
            // Group cards by member (native Trello assignment + Power-Up Assign tab) for drill-down
            const mc = {};
            cardData.forEach(({ id, listId, data, log, assignedIds }) => {
              const cardObj2 = cards.find(c => c.id === id); const cardName = cardObj2 ? cardObj2.name : '';
              const listName = listNameMap[listId] || '';
              const est      = parseFloat(data.estimated) || 0;
              const spent    = parseFloat(data.spent)     || 0;
              const progress = parseInt(data.progress, 10) || 0;

              // Merge native card members + Power-Up assigned members, dedupe by id
              const nativeMembers = trelloMemberMap[id] || [];
              const assignedMembers = (assignedIds || []).map(mid => ({
                id: mid,
                name: memberNameMap[mid] || mid
              }));
              const seenIds = new Set();
              const combined = [];
              nativeMembers.concat(assignedMembers).forEach(m => {
                if (m.id && !seenIds.has(m.id)) { seenIds.add(m.id); combined.push(m); }
              });

              combined.forEach(m => {
                const mname = m.name || memberNameMap[m.id] || m.id;
                if (!mc[mname]) mc[mname] = {};
                if (!mc[mname][listName]) mc[mname][listName] = [];
                mc[mname][listName].push({ cardName, est, spent, progress });
              });
            });
            return mc;
          })(),
          labels: Object.values(labelMap).sort((a, b) => {
            // Sort: Phase 1 before Phase 2, then by count
            const order = { 'Phase 1': 0, 'Phase 2': 1 };
            const ao = order[a.name] !== undefined ? order[a.name] : 2 + b.count;
            const bo = order[b.name] !== undefined ? order[b.name] : 2 + b.count;
            return ao - bo;
          }).map(l => ({
            name: l.name, color: l.color,
            avgPct: Math.round(l.pctSum / l.count), count: l.count
          })),
          cardRows
        };

        // Trello's board-private plugin data has a combined 8192-char cap
        // across ALL keys for that scope — not per key. After many rounds of
        // experimentation, dozens of small leftover keys accumulated and
        // pushed the total over budget, so even tiny new saves started
        // failing. Store the full summary in localStorage instead (shared
        // origin with list-summary.html), which has no such tiny limit, and
        // do a best-effort one-time cleanup of the old Trello keys so they
        // stop eating into the shared 8KB budget used by 'timetrack-list-colors'.
        return t.board('id').then(board2 => {
          try {
            localStorage.setItem('timetrack-summary-' + board2.id, JSON.stringify(summary));
            console.log('Summary saved to localStorage,', JSON.stringify(summary).length, 'chars');
          } catch (e) {
            console.error('localStorage save failed:', e);
          }

          // Best-effort cleanup of old Trello-stored keys (ignore all errors)
          const staleKeys = [
            'timetrack-summary', 'timetrack-rowcount', 'timetrack-mccount',
            'timetrack-extended', 'timetrack-cardrows', 'timetrack-mbrCards',
            'export-meta', 'export-index-meta'
          ];
          for (let i = 0; i < 25; i++) {
            staleKeys.push('timetrack-rows-' + i, 'timetrack-mc-' + i, 'export-batch-' + i, 'export-index-' + i);
          }
          staleKeys.forEach(k => {
            t.remove('board', 'private', k).catch(() => {});
          });
        });
      });
    });
  }).catch((err) => { console.error('Summary build error:', err); }).then(() => t.popup({ title: 'Time Summary', url: './list-summary.html', height: 600 }));
}

// ─── Export (runs in connector context — has full board access) ──────────────────
function openExportPopup(t) {
  // Build the full export dataset in the CONNECTOR context (has reliable
  // access to every card's plugin data), then hand it to export.html via
  // localStorage — both files share the same origin, so this bypasses
  // Trello's 8KB per-key plugin-data limit entirely.

  // Retry a t.get() call up to `retries` times before giving up, so a
  // transient network hiccup during a long sequential fetch doesn't
  // silently drop a card's estimated hours.
  function getWithRetry(cardId, key, retries) {
    return t.get(cardId, 'shared', key).catch(function(err) {
      if (retries > 0) {
        return new Promise(function(resolve) { setTimeout(resolve, 150); })
          .then(function() { return getWithRetry(cardId, key, retries - 1); });
      }
      console.warn('Export: failed to read', key, 'for card', cardId, 'after retries:', err && err.message);
      return null; // caller treats null as "no data" the same as {}
    });
  }

  return t.board('id').then(function(board) {
    var boardId = board.id;

    return Promise.all([
      t.lists('all', 'id', 'name').catch(function() { return t.lists('id', 'name'); }),
      t.cards('all', 'badges').catch(function(err) {
        console.error('t.cards with badges failed, falling back to plain all:', err);
        return t.cards('all');
      })
    ]).then(function(r) {
      var lists    = r[0] || [];
      var allCards = r[1] || [];

      console.log('Export: raw lists=', lists.length, ' raw cards=', allCards.length);

      var listNameMap = {};
      lists.forEach(function(l) { listNameMap[l.id] = l.name; });

      var excludedByList = 0;
      var filtered = allCards.filter(function(c) {
        const keep = listNameMap[c.idList] !== 'Resources';
        if (!keep) excludedByList++;
        return keep;
      });
      filtered.forEach(function(c) { c._listName = listNameMap[c.idList] || ''; });

      console.log('Export: cards after Resources filter =', filtered.length,
                  '(excluded', excludedByList, 'Resources cards)');

      // Sequential fetch with retry — proven reliable from connector context
      var results = [];
      var readFailures = 0;
      return filtered.reduce(function(chain, card) {
        return chain.then(function() {
          return Promise.all([
            getWithRetry(card.id, 'timetrack', 2),
            getWithRetry(card.id, 'timetrack-members', 2),
            getWithRetry(card.id, 'timetrack-assigned', 2)
          ]).then(function(res) {
            if (res[0] === null) readFailures++;
            results.push({ card: card, data: res[0] || {}, log: res[1] || [], assigned: res[2] || [] });
          });
        });
      }, Promise.resolve()).then(function() {
        if (readFailures > 0) {
          console.warn('Export:', readFailures, 'card(s) had unreadable timetrack data even after retries — they will show as having no estimate.');
        }
        return results;
      });

    }).then(function(cardData) {
      var memberNameMap = {};
      cardData.forEach(function(item) {
        (item.log||[]).forEach(function(e) {
          if (e.memberId && e.name) memberNameMap[e.memberId] = e.name;
        });
      });

      var rows = [];
      var skippedNoEstimate = 0;
      cardData.forEach(function(item) {
        var card   = item.card;
        var data   = item.data || {};
        var log    = item.log  || [];
        var est    = parseFloat(data.estimated) || 0;
        if (est <= 0) { skippedNoEstimate++; return; } // only cards with estimated hours

        var labels = card.labels || [];
        var phase  = '';
        for (var i = 0; i < labels.length; i++) {
          if (labels[i].name === 'Phase 1') { phase = 'Phase 1'; break; }
          if (labels[i].name === 'Phase 2') { phase = 'Phase 2'; }
        }

        var nativeNames   = (card.members||[]).map(function(m){ return m.fullName||m.username||''; }).filter(Boolean);
        var assignedNames = (item.assigned||[]).map(function(mid){ return memberNameMap[mid]||''; }).filter(Boolean);
        var allNames      = nativeNames.concat(assignedNames).filter(function(n,i,a){ return a.indexOf(n)===i; });
        var notes         = log.map(function(e){ return e.note||''; }).filter(Boolean).join('; ');

        // Item Count — total checklist items across all of the card's checklists,
        // read from Trello's card badges summary (badges.checkItems is the total
        // count of checklist items on the card). Defaults to 1 if the card has
        // no checklist items at all.
        var itemCount = (card.badges && card.badges.checkItems) || 0;
        if (itemCount === 0) itemCount = 1;

        rows.push([
          card._listName || '',
          card.name || '',
          itemCount,
          phase,
          est,
          parseFloat(data.spent) || 0,
          allNames.length > 0 ? 'Assigned' : 'Unassigned',
          allNames.length > 0 ? allNames.join(', ') : 'TBD',
          notes
        ]);
      });

      console.log('Export: built', rows.length, 'rows with estimated hours (',
                  skippedNoEstimate, 'cards skipped for having no estimate)');

      // Write to localStorage — shared across iframes on the same origin
      try {
        localStorage.setItem('timetrack-export-' + boardId, JSON.stringify({
          rows: rows,
          builtAt: Date.now()
        }));
        console.log('Export: saved to localStorage, key=timetrack-export-' + boardId);
      } catch (e) {
        console.error('Export: localStorage write failed', e);
      }
    });

  }).then(function() {
    return t.popup({ title: 'Export to Excel', url: './export.html', height: 280 });
  }).catch(function(err) {
    console.error('Export error:', err);
    return t.popup({ title: 'Export to Excel', url: './export.html', height: 280 });
  });
}


// ─── Board Buttons ────────────────────────────────────────────────────────────
function boardButtons(t) {
  return [
    {
      icon: 'https://cdn-icons-png.flaticon.com/512/2088/2088617.png',
      text: 'Time Summary',
      callback: openBoardSummary
    },
    {
      icon: 'https://cdn-icons-png.flaticon.com/512/724/724933.png',
      text: 'Export to Excel',
      callback: openExportPopup
    }
  ];
}

// ─── Initialize ───────────────────────────────────────────────────────────────
TrelloPowerUp.initialize({
  'card-badges':        cardBadges,
  'card-detail-badges': cardDetailBadges,
  'card-buttons':       cardButtons,
  'board-buttons':      boardButtons
}, {
  appKey:  'ed700e2887fc04558ed3a0efa61f25b6',
  appName: 'TimeTrack'
});
</script>
